<!DOCTYPE html>
<html>
<head>
  <title>RateMyGuru - Logging you in...</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'DM Sans', sans-serif;
      background: #0F1729;
      display: flex; align-items: center; justify-content: center;
      min-height: 100vh; color: white;
    }
    @import url('https://fonts.googleapis.com/css2?family=Fraunces:wght@800&family=DM+Sans:wght@400;600&display=swap');
    .box {
      text-align: center;
      animation: fadeUp 0.4s ease;
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .logo {
      display: flex; align-items: center; gap: 10px;
      justify-content: center; margin-bottom: 32px;
    }
    .logo-icon {
      width: 40px; height: 40px;
      background: linear-gradient(135deg, #FF6B35, #FF9A6C);
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
    }
    .logo-text {
      font-family: 'Fraunces', serif;
      font-weight: 800; font-size: 22px; color: white;
    }
    .spinner {
      width: 48px; height: 48px;
      border: 3px solid rgba(255,107,53,0.2);
      border-top-color: #FF6B35;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 20px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .title {
      font-family: 'Fraunces', serif;
      font-size: 22px; font-weight: 800;
      margin-bottom: 8px;
    }
    .subtitle { color: #475569; font-size: 14px; }
    .error-box {
      background: #FEE2E2; border: 1px solid #FECACA;
      border-radius: 12px; padding: 16px 24px;
      color: #DC2626; font-size: 14px; margin-top: 20px;
      max-width: 360px;
    }
  </style>
</head>
<body>
  <div class="box">
    <div class="logo">
      <div class="logo-icon">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="white">
          <path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/>
        </svg>
      </div>
      <span class="logo-text">RateMyGuru</span>
    </div>
    <div class="spinner" id="spinner"></div>
    <div class="title" id="title">Logging you in...</div>
    <div class="subtitle" id="subtitle">Connecting your LinkedIn profile</div>
    <div id="error"></div>
  </div>

  <script>
    async function handleCallback() {
      const params = new URLSearchParams(window.location.search);
      const code = params.get("code");
      const error = params.get("error");

      if (error) {
        showError("LinkedIn login was cancelled or failed. Please try again.");
        return;
      }

      if (!code) {
        showError("No authorization code received. Please try again.");
        return;
      }

      try {
        // Send code to our backend
        const res = await fetch("http://localhost:3001/api/auth/linkedin", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ code }),
        });

        const data = await res.json();

        if (!res.ok) throw new Error(data.error || "Login failed");

        // Save user + token to localStorage
        localStorage.setItem("rmg_user", JSON.stringify(data.user));
        localStorage.setItem("rmg_token", data.token);

        // Update UI
        document.getElementById("spinner").style.display = "none";
        document.getElementById("title").textContent = `Welcome, ${data.user.name}! 🎉`;
        document.getElementById("subtitle").textContent = "Redirecting you back...";

        // Redirect back to homepage after 1.5s
        setTimeout(() => {
          window.location.href = "/";
        }, 1500);

      } catch (err) {
        showError(err.message || "Something went wrong. Please try again.");
      }
    }

    function showError(msg) {
      document.getElementById("spinner").style.display = "none";
      document.getElementById("title").textContent = "Login Failed";
      document.getElementById("subtitle").textContent = "";
      document.getElementById("error").innerHTML = `<div class="error-box">❌ ${msg}</div>`;
    }

    handleCallback();
  </script>
</body>
</html>
